// =============================================================================
//
// Waybar configuration
//
// Configuration reference: https://github.com/Alexays/Waybar/wiki/Configuration
//
// =============================================================================

{
    // -------------------------------------------------------------------------
    // Global configuration
    // -------------------------------------------------------------------------

    "layer": "top",

    "position": "top",

    // If height property would be not present, it'd be calculated dynamically
    "height": 30,

    "modules-left": [
        "hyprland/workspaces",
    ],
    "modules-center": [
    ],
    "modules-right": [
        "network",
				"hyprland/language",
				"backlight",
				"pulseaudio",
        "memory",
        "cpu",
        "temperature",
        "battery",
        "tray",
        "clock#date",
        "clock#time"
    ],


    // -------------------------------------------------------------------------
    // Modules
    // -------------------------------------------------------------------------

    "battery": {
        "interval": 10,
        "states": {
            "warning": 30,
            "critical": 15
        },
        // Connected to AC
        "format": "´çŽ {icon}  {capacity}%", // Icon: bolt
        // Not connected to AC
        "format-discharging": "{icon}  {capacity}%",
        "format-icons": [
            "´ëä", // Icon: battery-full
            "´ëâ", // Icon: battery-three-quarters
            "´ëé", // Icon: battery-half
            "´ëü", // Icon: battery-quarter
            "´ëÇ"  // Icon: battery-empty
        ],
        "tooltip": true
    },

    "clock#time": {
        "interval": 1,
        "format": "ˇ░ąö {:%H:%M}",
        "tooltip": false
    },

    "clock#date": {
      "interval": 10,
      "format": "´ü│  {:%e %b %Y}", // Icon: calendar-alt
      "tooltip-format": "{:%e %B %Y}"
    },

    "cpu": {
        "interval": 5,
        "format": "´őŤ  {usage}%", // Icon: microchip
        "states": {
          "warning": 70,
          "critical": 90
        }
    },
		"hyprland/language": {
				"format": "´äť  {}",
				"format-en": "US",
				"format-ru": "RU",
				"format-ua": "UA",
				"format-tr": "As bayraklar─▒",
				"keyboard-name": "at-translated-set-2-keyboard"
		},
    "memory": {
        "interval": 5,
        "format": "´öŞ  {}%", // Icon: memory
        "states": {
            "warning": 70,
            "critical": 90
        }
    },

    "network": {
        "interval": 5,
        "format-wifi": " ´çź  {essid}", // Icon: wifi
        "format-ethernet": "´×ľ  {ifname}: {ipaddr}/{cidr}", // Icon: ethernet
        "format-disconnected": "ÔÜá  Disconnected",
        "tooltip-format": "{ifname}: {ipaddr}"
    },

    "sway/mode": {
        "format": "<span style=\"italic\">´î×  {}</span>", // Icon: expand-arrows-alt
        "tooltip": false
    },

    "hyprland/window": {
        "format": "{}",
        "max-length": 50
    },

    "hyprland/workspaces": {
        "all-outputs": false,
        "disable-scroll": true,
        "format": " {name}"
        
    },
    "pulseaudio": {
        //"scroll-step": 1,
        "format": "{icon}  {volume}%",
        "format-bluetooth": "{icon}  {volume}%´Őö",
        "format-muted": "´ÇŽ",
        "format-icons": {
            "headphones": "´Çą",
            "handsfree": "´ľÉ",
            "headset": "´ľÉ",
            "phone": "´éĽ",
            "portable": "´éĽ",
            "car": "´ć╣",
            "default": ["´ÇŽ", "´Çž","´ÇĘ","´ÇĘ"]
        },
        "on-click": "pavucontrol"
    },

    "temperature": {
      "critical-threshold": 80,
      "interval": 5,
      "format": "{icon}  {temperatureC}┬░C",
      "format-icons": [
          "´őő", // Icon: temperature-empty
          "´őŐ", // Icon: temperature-quarter
          "´őë", // Icon: temperature-half
          "´őł", // Icon: temperature-three-quarters
          "´őł"  // Icon: temperature-full
      ],
      "tooltip": true
    },
		"backlight": {
        // "device": "acpi_video1",
        "format": "{icon} {percent}%",
        "format-icons": ["ˇ░â×", "ˇ░âŁ", "ˇ░âč", "ˇ░âá"]
    },
    "tray": {
        "icon-size": 21,
        "spacing": 10
    }

}
